<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<style>
body {
    font-family: "Arial Black";
    background-color: lightskyblue;
}
{
    box-sizing: border-box;
}

/* Add padding to containers */
.container {
    padding: 15px;
    background-color: white;
    font-family: "Arial Black";
}

/* Full-width input fields */
input[type=text], input[type=text] 
    {
    width: 90%;
    padding: 14px;
    margin: 5px 0 22px 0;
    display: inline-block;
    border-radius: 10px;
    background: #F0F0F4;
    font-family: "Arial Black";
}

input[type=text]:focus, input[type=text]:focus {
    background: white;
    outline: none;
    font-family: "Arial Black";
}

/* Overwrite default styles of hr */
hr {
    border: 1px solid #f1f1f1;
    margin-bottom: 25px;
}

/* Set a style for the submit button */
.registerbtn {
    background-color: navy;
    color: white;
    padding: 15px 21px;
    margin: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    width: 25%;
    opacity: 0.5;
    font-family: "Arial Black";
}

.registerbtn:hover {
    opacity: 1;
}

a {
    color: mediumseagreen;
    font-family: "Arial Black";
}

.signin {
    background-color: #ffffff;
    text-align: center;
    font-family: "Arial Black";
}
</style>
</head>

<form ACTION="categoriesinsert.php"METHOD="POST">
  <div class="container">
    <center><h1 style="color:#B22222; font-family: 'Arial Black';" size="45">GIVE APPROPRIATE DETAILS</h1></center>
    <hr>
      
      <label for="CATEGORIES_ID"><b style="font-family: 'Arial Black';">CATEGORIES ID</b></label>
    <input type="text" placeholder="Enter CATE_ID" name="CATEGORIES_ID" required>

    <label for="CATEGORIES_DESC"><b style="font-family: 'Arial Black';">CATEGORIES DESC</b></label>
    <input type="text" placeholder="Enter CATE DESC" name="CATEGORIES_DESC" required>
      
      <button type="update" class="registerbtn">UPDATE</button>
    <button type="reset" class="registerbtn">RESET</button>
  </div>
</form>
</body>
</html>
